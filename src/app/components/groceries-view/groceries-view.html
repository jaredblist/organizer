<div class="groceriesView">
    @for (category of categories; track $index) {
    <div class="category">
        <div class="categoryName">{{category.name}}</div>
        @for (item of getItemsForCategory(category.name); track $index) {
        <div class="ingredient" [class.checked]="item.checked">
            <span class="ingredientCheck">
                <input type="checkbox" [checked]="item.checked" (click)="toggleItem(item)"
                    (change)="itemCheckedChanged(item, $event)">
            </span>
            <span class="ingredientAmount">
                {{item.amount}}
            </span>
            <span class="ingredientName">
                {{item.name}}
            </span>
            <span class="ingredientTags">

            </span>
        </div>
        }
    </div>
    }
</div>
